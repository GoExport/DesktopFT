name: Build and Publish Tag Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: win32
            arch: x64
          - runner: windows-latest
            platform: win32
            arch: ia32
          - runner: macos-15-intel
            platform: darwin
            arch: x64
          - runner: ubuntu-22.04
            platform: linux
            arch: x64
          - runner: ubuntu-22.04
            platform: linux
            arch: ia32

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'npm'

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg

      - name: Install dependencies
        run: npm install

      - name: Build distributables
        run: npx electron-forge make --platform=${{ matrix.platform }} --arch=${{ matrix.arch }}

      - name: Make Windows artifact names unique
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          $renamed = @()
          Get-ChildItem -Path out/make -File -Recurse | ForEach-Object {
            $oldName = $_.Name
            $newName = "$($_.BaseName)-${{ matrix.arch }}$($_.Extension)"
            Rename-Item -LiteralPath $_.FullName -NewName $newName
            $renamed += [PSCustomObject]@{ OldName = $oldName; NewName = $newName }
          }

          Get-ChildItem -Path out/make -File -Recurse -Filter '*RELEASES*' | ForEach-Object {
            $contents = Get-Content -LiteralPath $_.FullName -Raw
            foreach ($item in $renamed) {
              $contents = $contents.Replace($item.OldName, $item.NewName)
            }
            Set-Content -LiteralPath $_.FullName -Value $contents -NoNewline
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: make-${{ matrix.platform }}-${{ matrix.arch }}
          path: out/make/**/*
          if-no-files-found: error

  build-linux-generic:
    name: Build generic-linux-${{ matrix.arch }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x64
          - ia32

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Package generic Linux application
        run: npx electron-forge package --platform=linux --arch=${{ matrix.arch }}

      - name: Create generic Linux archive
        shell: bash
        run: |
          package_dir=$(find out -mindepth 1 -maxdepth 1 -type d -name 'FlashThemes-linux-*' -print -quit)
          if [ -z "$package_dir" ]; then
            echo "Packaged Linux application directory not found"
            exit 1
          fi
          mkdir -p out/make
          tar -czf "out/make/FlashThemes-linux-${{ matrix.arch }}.tar.gz" -C out "$(basename "$package_dir")"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: make-linux-generic-${{ matrix.arch }}
          path: out/make/FlashThemes-linux-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs:
      - build
      - build-linux-generic

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release-assets/**/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}